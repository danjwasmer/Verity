<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verity — The Truth About Your Relationship</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1208;
    --surface: #221a0e;
    --surface2: #2a2010;
    --border: #3d3020;
    --text: #f0e8d8;
    --text-soft: #c8b99a;
    --muted: #8a7860;
    --accent: #d4a853;
    --accent-dim: #a07c38;
    --accent-soft: rgba(212,168,83,0.12);
    --sage: #7aaa8e;
    --rose: #c47a7a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(212,168,83,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(122,170,142,0.04) 0%, transparent 50%);
  }

  /* ── HERO ── */
  .hero {
    width: 100%;
    max-width: 680px;
    padding: 52px 28px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    border: 1px solid var(--accent-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    opacity: 0.85;
  }

  .logo-mark svg {
    width: 18px;
    height: 18px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
  }

  .wordmark {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .hero-title {
    font-size: clamp(32px, 7vw, 48px);
    font-weight: 300;
    font-style: italic;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .hero-sub {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: var(--text-soft);
    letter-spacing: 0.08em;
    margin-bottom: 32px;
    opacity: 0.8;
  }

  /* ── TRUST STRIP ── */
  .trust-strip {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    width: 100%;
    max-width: 480px;
    margin-bottom: 40px;
  }

  .trust-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 8px;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  .trust-item:last-child { border-right: none; }

  .trust-icon {
    font-size: 18px;
    line-height: 1;
  }

  .trust-label {
    font-family: 'Jost', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-soft);
    text-align: center;
  }

  /* ── FRAMEWORKS ── */
  .section-label {
    font-family: 'Jost', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .frameworks {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 48px;
  }

  .fw-tag {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid rgba(212,168,83,0.25);
    padding: 5px 12px;
    border-radius: 20px;
  }

  /* ── HOW IT WORKS ── */
  .how-it-works {
    width: 100%;
    max-width: 680px;
    padding: 0 28px 48px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .step-number {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--accent-dim);
  }

  .step-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
