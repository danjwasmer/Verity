<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verity — Honest Advice for Relationships That Matter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f0e8;
    --surface: #ede8df;
    --surface2: #e4ddd3;
    --border: #d0c8bc;
    --text: #1a3a3a;
    --text-soft: #2e4e4e;
    /* Improved contrast for accessibility */
    --muted: #3d5a5a; 
    --accent: #2a8a8a;
    --accent-dim: #1f6666;
    --accent-soft: rgba(42,138,138,0.12);
    --sage: #3a9a6a;
    --rose: #c47a7a;
    --blue: #4a7ab0;
    --lavender: #7a6ab0;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    overflow-x: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(42,138,138,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(42,138,138,0.04) 0%, transparent 50%);
  }

  .page { display: none; width: 100%; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
  .page.active { display: flex; opacity: 1; }

  .loading-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 16px;
    color: var(--muted); font-family: 'Jost', sans-serif;
    font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 1px solid #d0c8bc; border-top-color: #2a8a8a;
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logo-wrap {
    background: var(--bg);
    border-radius: 12px;
    padding: 8px 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    min-height: 60px; /* Placeholder for logo loading */
  }
  .logo-wrap img { width: 120px; display: block; }

  .hero {
    width: 100%; max-width: 680px;
    padding: 52px 28px 36px;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }
  .hero-title {
    font-size: clamp(32px, 6vw, 48px); font-weight: 300;
    font-style: italic; line-height: 1.2;
    color: var(--text); margin-bottom: 18px;
  }
  .hero-sub {
    font-family: 'Jost', sans-serif; font-weight: 400;
    font-size: 15px; color: var(--text-soft);
    letter-spacing: 0.08em; margin-bottom: 40px;
  }

  .trust-strip {
    display: flex; border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    width: 100%; max-width: 460px; margin-bottom: 48px;
  }
  .trust-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 8px; padding: 18px 4px;
    background: var(--surface); border-right: 1px solid var(--border);
  }
  .trust-item:last-child { border-right: none; }
  .trust-label {
    font-family: 'Jost', sans-serif; font-size: 11px;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-soft); text-align: center;
  }

  .login-card {
    width: 100%; max-width: 420px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 36px 32px; margin: 0 28px;
  }
  .login-title {
    font-size: 24px; font-weight: 300; font-style: italic;
    margin-bottom: 10px; color: var(--text); line-height: 1.3;
  }
  .input-field {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; font-family: 'Jost', sans-serif;
    font-size: 16px; font-weight: 300; color: var(--text);
    outline: none; transition: border-color 0.2s; margin-bottom: 14px;
    -webkit-appearance: none;
  }
  .input-field:focus { border-color: var(--accent-dim); }
  .primary-btn {
    width: 100%; background: var(--accent-dim); border: none;
    color: #fff; font-family: 'Jost', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 15px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .primary-btn:hover:not(:disabled) { background: var(--accent); }
  .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .how-it-works {
    width: 100%; max-width: 680px;
    padding: 48px 28px; display: grid;
    grid-template-columns: repeat(4, 1fr); gap: 14px;
  }
  .step { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 16px; }

  .chat-header {
    width: 100%; max-width: 680px;
    padding: 20px 28px 0;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .chat-wrap {
    width: 100%; max-width: 680px; flex: 1;
    display: flex; flex-direction: column;
    padding: 0 28px; overflow-y: auto;
  }
  .messages { display: flex; flex-direction: column; padding-bottom: 20px; }
  .msg-body { font-size: 18px; font-weight: 300; line-height: 1.8; color: var(--text); white-space: pre-wrap; padding-left: 34px; }

  .input-area {
    width: 100%; max-width: 680px;
    padding: 16px 28px 24px;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--bg);
  }
  .input-box {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    resize: none; font-family: 'Cormorant Garamond', serif;
    font-size: 18px; color: var(--text);
    min-height: 28px; max-height: 150px;
    overflow-y: auto;
  }

  /* Accessibility & Mobile tweaks */
  @media (max-width: 520px) {
    .trust-strip { max-width: 100%; }
    .trust-label { font-size: 9px; }
    .how-it-works { grid-template-columns: 1fr; }
    .hero-title { font-size: 28px; }
  }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <div id="loadingText">Let's Chat</div>
</div>

<div id="landingPage" class="page">
  <div class="hero">
    <div class="logo-wrap"><img src="/logo.png" alt="Verity" /></div>
    <h1 class="hero-title">Honest advice for relationships that matter</h1>
    <p class="hero-sub">Psychology-grounded · Confidential · Always honest</p>
    
    <div class="trust-strip">
      <div class="trust-item"><div class="trust-label">Private</div></div>
      <div class="trust-item"><div class="trust-label">Science-Based</div></div>
      <div class="trust-item"><div class="trust-label">No Judgment</div></div>
      <div class="trust-item"><div class="trust-label">Always Honest</div></div>
    </div>

    <div class="login-card">
      <div id="loginForm">
        <div class="login-title">Begin your journey</div>
        <input type="email" id="emailInput" class="input-field" placeholder="your@email.com" autocomplete="email" />
        <button class="primary-btn" id="sendLinkBtn" onclick="sendMagicLink()">Send login link</button>
        <button class="guest-btn" style="width:100%; margin-top:12px; background:none; border:1px solid var(--border); padding:12px; cursor:pointer;" onclick="startAsGuest()">Continue as Guest</button>
      </div>
      <div id="successMsg" style="display:none; text-align:center;">
        <div>Check your inbox. We sent a link to <strong id="sentEmail"></strong>.</div>
      </div>
    </div>
  </div>
</div>

<div id="typePage" class="page">
    <div class="type-page-logo" style="margin-top:40px;"><img src="/logo.png" width="100" /></div>
    <div class="type-header" style="text-align:center; margin: 30px 0;">
        <h2 style="font-style:italic; font-weight:300;">Choose a focus</h2>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; padding:20px; max-width:600px;">
        <button onclick="selectType('romantic')" style="padding:40px 20px; border:1px solid var(--border); background:var(--surface); cursor:pointer;">Romantic</button>
        <button onclick="selectType('workplace')" style="padding:40px 20px; border:1px solid var(--border); background:var(--surface); cursor:pointer;">Workplace</button>
        <button onclick="selectType('family')" style="padding:40px 20px; border:1px solid var(--border); background:var(--surface); cursor:pointer;">Family</button>
        <button onclick="selectType('friendship')" style="padding:40px 20px; border:1px solid var(--border); background:var(--surface); cursor:pointer;">Friendship</button>
    </div>
</div>

<div id="chatPage" class="page" style="height:100vh;">
  <div class="chat-header">
    <div onclick="goToTypeSelector()" style="cursor:pointer;">← Menu</div>
    <div id="typeBadge" class="chat-type-badge">Romantic</div>
    <button onclick="signOut()" class="signout-btn">Exit</button>
  </div>
  <div class="chat-wrap" id="chatWrap">
    <div class="messages" id="messages"></div>
    <div id="typing" class="typing" style="display:none; padding-left:34px;">...</div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" placeholder="Share what's on your mind…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
  let isLoading = false;
  let currentType = 'romantic';
  let isGuest = false;

  const TYPE_CONFIG = {
    romantic: { label: 'Romantic', opening: "Welcome. I'm Verity. What's been weighing on you lately regarding your relationship?" },
    workplace: { label: 'Workplace', opening: "Welcome. I'm here to help navigate work dynamics. What's happening at the office?" },
    family: { label: 'Family', opening: "Family dynamics are complex. What's been on your mind regarding your family?" },
    friendship: { label: 'Friendship', opening: "Friendships matter deeply. What's going on with your friend today?" }
  };

  function showPage(name) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(name);
    target.style.display = 'flex';
    setTimeout(() => target.classList.add('active'), 10);
  }

  function goToTypeSelector() { showPage('typePage'); }

  function startAsGuest() {
    isGuest = true;
    showPage('typePage');
  }

  async function selectType(type) {
    currentType = type;
    document.getElementById('typeBadge').textContent = TYPE_CONFIG[type].label;
    document.getElementById('messages').innerHTML = '';
    showPage('chatPage');
    
    if (isGuest) {
      appendMessage('ai', TYPE_CONFIG[type].opening);
    } else {
      await loadHistory(type);
    }
  }

  // Improved Load Logic with Timeout Stress-Test
  window.addEventListener('load', async () => {
    const timeout = setTimeout(() => {
        if (document.getElementById('loadingScreen').style.display !== 'none') {
            showPage('landingPage');
            console.warn("Auth check timed out.");
        }
    }, 4000);

    try {
      const res = await fetch('/api/auth/me');
      const data = await res.json();
      clearTimeout(timeout);
      if (data.authenticated) {
        showPage('typePage');
      } else {
        showPage('landingPage');
      }
    } catch {
      clearTimeout(timeout);
      showPage('landingPage');
    }
  });

  async function sendMagicLink() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) return;
    
    const btn = document.getElementById('sendLinkBtn');
    btn.disabled = true; // Prevent double submission immediately
    btn.textContent = 'Sending...';

    try {
      const res = await fetch('/api/auth/send-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('sentEmail').textContent = email;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        throw new Error();
      }
    } catch {
      btn.disabled = false;
      btn.textContent = 'Send login link';
      alert('Failed to send. Please check your connection.');
    }
  }

  function appendMessage(role, text) {
    const container = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.style.padding = "20px 0";
    msg.style.borderBottom = "1px solid rgba(0,0,0,0.05)";
    
    const label = document.createElement('div');
    label.style.fontFamily = "Jost";
    label.style.fontSize = "12px";
    label.style.textTransform = "uppercase";
    label.style.color = "var(--accent)";
    label.textContent = role === 'user' ? 'You' : 'Verity';
    
    const body = document.createElement('div');
    body.className = 'msg-body';
    body.textContent = text; // Safe textContent handling
    
    msg.appendChild(label);
    msg.appendChild(body);
    container.appendChild(msg);
    
    const wrap = document.getElementById('chatWrap');
    wrap.scrollTop = wrap.scrollHeight;
  }

  async function sendMessage() {
    if (isLoading) return;
    const textarea = document.getElementById('userInput');
    const text = textarea.value.trim();
    if (!text) return;

    textarea.value = '';
    textarea.style.height = 'auto';
    appendMessage('user', text);
    
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('typing').style.display = 'block';

    try {
      const endpoint = isGuest ? '/api/chat/guest' : '/api/chat';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, type: currentType })
      });
      const data = await res.json();
      if (data.reply) appendMessage('ai', data.reply);
    } catch {
      appendMessage('ai', 'Connection lost. Please try again.');
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('typing').style.display = 'none';
    }
  }

  // Auto-resize for textarea
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  async function signOut() {
    if (!isGuest) await fetch('/api/auth/signout', { method: 'POST' });
    location.reload();
  }
</script>
</body>
</html>
